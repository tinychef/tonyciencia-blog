name: Validate Seed
on:
  pull_request:
    paths:
      - 'seed/**'
  push:
    paths:
      - 'seed/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: npx emdash seed seed/seed.json --validate
