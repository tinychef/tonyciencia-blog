name: Validate Seed
on:
  pull_request:
    paths:
      - 'seed/base/**'
      - 'content/**'
      - 'scripts/build-seed.mjs'
      - 'package.json'
  push:
    paths:
      - 'seed/base/**'
      - 'content/**'
      - 'scripts/build-seed.mjs'
      - 'package.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build:seed
      - run: pnpm check:seo-i18n
      - run: pnpm typecheck
      - run: pnpm build
      - run: npx emdash seed seed/seed.json --validate
